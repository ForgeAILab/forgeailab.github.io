    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Forge?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forge is a self-hosted workflow engine for coding agents. It handles coding agent orchestration: tasks, isolated git worktrees, CI gates, and a review and merge workflow, all from a single local binary."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use different agents for different work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — that's the point. Forge lets you pick which coding agent runs each task, so you can match the agent to the job: one for UI work, another for refactors, a lighter one for routine changes."
          }
        },
        {
          "@type": "Question",
          "name": "Which coding agents does Forge support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forge ships adapters for Claude Code, Codex, Gemini, opencode, and a generic shell executor. More can be added with a small adapter."
          }
        },
        {
          "@type": "Question",
          "name": "How do isolated git worktrees work in Forge?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each task gets its own git worktree when an agent claims it. Path guards keep parallel work clean, and the worktree is cleaned up automatically when the task is done or cancelled."
          }
        },
        {
          "@type": "Question",
          "name": "Is Forge an API-first developer tool?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Forge is API-first: a REST API, MCP JSON-RPC, the forge-ctl CLI, and the web UI all drive the same task pipeline, so you can script the full review and merge workflow."
          }
        },
        {
          "@type": "Question",
          "name": "Is Forge really self-hosted?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forge runs as one local Rust binary backed by SQLite. There are no accounts, no telemetry, and no SaaS dependency — your code never leaves your infrastructure."
          }
        },
        {
          "@type": "Question",
          "name": "What license is Forge under?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forge is MIT-licensed and developed in the open on GitHub."
          }
        }
      ]
